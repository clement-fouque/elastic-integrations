source:
  index:
    - "logs-hackerone.report-*"
  query:
    bool:
      must_not:
        - exists:
            field: error.message
        - terms:
            _tier:
              - data_frozen
              - data_cold
dest:
  index: "logs-hackerone.reports-latest-v1"
  aliases:
    - alias: "logs-hackerone.reports-latest"
      move_on_creation: true
latest:
  unique_key:
    - data_stream.namespace
    - event.dataset
    - event.id
  sort: event.ingested
sync:
  time:
    field: event.ingested
    delay: 120s
description: >-
  Latest Reports from HackerOne. As reports get updated, this transform stores only the latest state of each report inside the destination index. Thus the transform's destination index contains only the latest state of the report.
frequency: 30s
settings:
  deduce_mappings: false
  unattended: true
_meta:
  managed: false
  # Bump this version to delete, reinstall, and restart the transform during
  # package installation.
  fleet_transform_version: 0.1.0
  run_as_kibana_system: false
