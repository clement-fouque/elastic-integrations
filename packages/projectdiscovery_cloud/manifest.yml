format_version: "3.4.2"
name: projectdiscovery_cloud
title: ProjectDiscovery Cloud
version: "0.1.0"
description: Collect vulnerability findings from ProjectDiscovery Cloud Platform (PDCP) with Elastic Agent.
type: integration
categories:
  - security
  - vulnerability_management
conditions:
  kibana:
    version: "^8.19.0 || ^9.1.0"
  elastic:
    subscription: basic
screenshots:
  - src: /img/sample-screenshot.png
    title: Sample screenshot
    size: 600x600
    type: image/png
icons:
  - src: /img/sample-logo.svg
    title: Sample logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: projectdiscovery_cloud
    title: ProjectDiscovery Cloud
    description: Collect vulnerability findings from ProjectDiscovery Cloud Platform.
    deployment_modes:
      default:
        enabled: true
      agentless:
        enabled: true
        organization: security
        division: engineering
        team: security-service-integrations
    inputs:
      - type: cel
        title: Collect ProjectDiscovery Cloud vulnerability findings via API
        description: Collecting ProjectDiscovery Cloud vulnerability findings via the export API.
        vars:
          - name: url
            type: text
            title: API URL
            description: Base URL of the ProjectDiscovery Cloud API.
            default: https://api.projectdiscovery.io
            multi: false
            required: true
            show_user: true
          - name: api_key
            type: password
            title: API Key
            description: API key sent as the `X-API-Key` request header. Generate from Settings → API Key in the ProjectDiscovery Cloud console.
            multi: false
            required: true
            show_user: true
            secret: true
          - name: team_id
            type: text
            title: Team ID
            description: Optional team identifier sent as the `X-Team-Id` request header. Leave empty to use the default team.
            multi: false
            required: false
            show_user: true
          - name: proxy_url
            type: text
            title: Proxy URL
            multi: false
            required: false
            show_user: false
            description: URL to proxy connections in the form of http[s]://<user>:<password>@<server name/ip>:<port>. Please ensure your username and password are in URL encoded format.
          - name: ssl
            type: yaml
            title: SSL Configuration
            description: SSL configuration options. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/configuration-ssl.html#ssl-common-config) for details.
            multi: false
            required: false
            show_user: false
            default: |
              #certificate_authorities:
              #  - |
              #    -----BEGIN CERTIFICATE-----
              #    ...
              #    -----END CERTIFICATE-----
owner:
  github: elastic/security-service-integrations
  type: elastic
